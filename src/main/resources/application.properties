spring.config.import=optional:file:.env[.properties]

spring.application.name=ferreira-auto
spring.datasource.url= ${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD:default_password}
spring.jpa.hibernate.ddl-auto=update

spring.messages.encoding=UTF-8

api.security.token.secret=${JWT_SECRET}

spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${EMAIL_SMTP_FROM}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false
mail.from.name=Ferreira Auto

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

order.queue.name=order.queue
