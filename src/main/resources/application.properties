spring.config.import=optional:file:.env[.properties]

spring.application.name=ferreira-auto
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD:default_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

spring.messages.encoding=UTF-8

api.security.token.secret=${JWT_SECRET}

spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${EMAIL_SMTP_FROM}
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false
mail.from.name=Ferreira Auto

order.queue.name=order.queue

server.port=${PORT:8080}

resend.api.key=${RESEND_API_KEY}
resend.domain=${RESEND_DOMAIN}

spring.cloudinary.name=${CLOUDINARY_NAME}
spring.cloudinary.api.key=${CLOUDINARY_API_KEY}
spring.cloudinary.api.secret=${CLOUDINARY_API_SECRET}

gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}

langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3.1